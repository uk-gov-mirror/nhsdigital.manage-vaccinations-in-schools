name: Deploy Documentation

on:
  push:
    branches:
      - release
      - next

permissions:
  contents: write

jobs:
  deploy-documentation:
    name: Generate and Publish RDoc
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-documentation-${{ github.ref_name }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
        with:
          bundler-cache: true

      - name: Generate Documentation
        run: bundle exec rake rdoc:generate

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: docs/rdoc
          target-folder: docs/rdoc/${{ github.ref_name }}
          clean: false
