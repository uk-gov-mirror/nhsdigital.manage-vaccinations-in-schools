---
extends: default

ignore:
  - config/settings.yml
  - node_modules

rules:
  comments:
    min-spaces-from-content: 1
  document-start: disable
  line-length:
    # Ideally, this value would be smaller, but it makes dealing with long lines
    #  including commit SHAs, etc. very difficult.
    max: 120
  truthy:
    ignore: .github/workflows/*
